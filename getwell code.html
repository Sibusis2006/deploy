<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Well Soon My Love ❤️</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Lora:ital,wght@0,400;1,400;1,600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffe0ec 0%, #fff5f7 25%, #fce4ec 50%, #fff9f0 75%, #ffe8d6 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Lora', serif;
    overflow-x: hidden;
    position: relative;
  }

  /* Background floating hearts */
  .bg-heart {
    position: fixed;
    pointer-events: none;
    animation: bgFloat linear infinite;
    opacity: 0;
    font-size: 1.2rem;
    z-index: 0;
  }

  @keyframes bgFloat {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.4; }
    90% { opacity: 0.2; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* Sparkles */
  .sparkle {
    position: absolute;
    pointer-events: none;
    animation: sparkleAnim ease-in-out infinite;
    font-size: 0.8rem;
    z-index: 1;
  }

  @keyframes sparkleAnim {
    0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
    50% { opacity: 1; transform: scale(1) rotate(180deg); }
  }

  /* Scene container */
  .scene {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    padding: 20px;
  }

  /* Tap button */
  .tap-btn {
    background: linear-gradient(135deg, #e91e63, #f48fb1);
    color: white;
    border: none;
    padding: 14px 36px;
    border-radius: 50px;
    font-family: 'Dancing Script', cursive;
    font-size: 1.4rem;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(233, 30, 99, 0.4);
    transition: all 0.3s ease;
    margin-top: 24px;
    animation: btnPulse 2s ease-in-out infinite;
    position: relative;
    z-index: 20;
  }

  .tap-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 12px 35px rgba(233, 30, 99, 0.5);
  }

  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 8px 25px rgba(233, 30, 99, 0.4); }
    50% { box-shadow: 0 8px 40px rgba(233, 30, 99, 0.7), 0 0 20px rgba(233, 30, 99, 0.3); }
  }

  .tap-btn.hidden { 
    opacity: 0; 
    pointer-events: none;
    transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  /* Envelope wrapper */
  .envelope-wrapper {
    position: relative;
    width: 340px;
    height: 240px;
    cursor: pointer;
    perspective: 1000px;
  }

  @media (max-width: 480px) {
    .envelope-wrapper { width: 290px; height: 205px; }
  }

  /* Sparkle positions around envelope */
  .sparkle-1 { top: -20px; left: 20px; animation-delay: 0s; animation-duration: 2s; }
  .sparkle-2 { top: -15px; right: 30px; animation-delay: 0.5s; animation-duration: 2.5s; }
  .sparkle-3 { top: 20px; left: -20px; animation-delay: 1s; animation-duration: 1.8s; }
  .sparkle-4 { top: 20px; right: -20px; animation-delay: 1.5s; animation-duration: 2.2s; }
  .sparkle-5 { bottom: 20px; left: -15px; animation-delay: 0.3s; animation-duration: 2s; }
  .sparkle-6 { bottom: 10px; right: -15px; animation-delay: 0.8s; animation-duration: 1.9s; }
  .sparkle-7 { top: -25px; left: 50%; animation-delay: 1.2s; animation-duration: 2.3s; }
  .sparkle-8 { bottom: -15px; left: 40%; animation-delay: 0.6s; animation-duration: 2.1s; }

  /* Envelope SVG container */
  .envelope-svg-wrap {
    width: 100%;
    height: 100%;
    position: relative;
    filter: drop-shadow(0 20px 40px rgba(233,30,99,0.3));
    transition: transform 0.3s ease;
  }

  .envelope-wrapper:hover .envelope-svg-wrap {
    transform: translateY(-5px);
  }

  /* Letter */
  .letter-container {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(0px);
    width: 300px;
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    transition: none;
  }

  @media (max-width: 480px) {
    .letter-container { width: 260px; }
  }

  .letter-container.slide-up {
    animation: slideLetterUp 1.2s ease forwards;
    animation-delay: 0.8s;
    pointer-events: auto;
  }

  @keyframes slideLetterUp {
    0% { transform: translateX(-50%) translateY(0px); opacity: 0; }
    30% { opacity: 1; }
    100% { transform: translateX(-50%) translateY(-260px); opacity: 1; }
  }

  .letter {
    background: linear-gradient(160deg, #fdf8f0 0%, #fef9e7 40%, #fdf3e3 70%, #fbebd8 100%);
    border-radius: 4px;
    padding: 28px 24px;
    box-shadow:
      0 4px 8px rgba(0,0,0,0.15),
      0 12px 30px rgba(0,0,0,0.12),
      inset 0 1px 3px rgba(255,255,255,0.8),
      inset 0 -1px 3px rgba(0,0,0,0.05);
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(210, 180, 140, 0.4);
  }

  /* Paper texture lines */
  .letter::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      transparent,
      transparent 27px,
      rgba(173, 145, 110, 0.12) 28px
    );
    pointer-events: none;
  }

  /* Aged paper edge effect */
  .letter::after {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse at top left, rgba(160, 120, 80, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(160, 120, 80, 0.1) 0%, transparent 50%);
    pointer-events: none;
  }

  .letter-title {
    font-family: 'Dancing Script', cursive;
    font-size: 1.55rem;
    font-weight: 700;
    color: #c0392b;
    text-align: center;
    margin-bottom: 18px;
    text-shadow: 0 1px 3px rgba(192, 57, 43, 0.2);
    position: relative;
    z-index: 1;
    line-height: 1.3;
    min-height: 2.2rem;
  }

  .letter-divider {
    width: 60%;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(192, 57, 43, 0.4), transparent);
    margin: 0 auto 16px;
    position: relative;
    z-index: 1;
  }

  .letter-body {
    font-family: 'Dancing Script', cursive;
    font-size: 1.0rem;
    color: #5d3a1a;
    line-height: 1.9;
    position: relative;
    z-index: 1;
    min-height: 180px;
  }

  .letter-body p { margin-bottom: 12px; }
  .letter-body .signature {
    margin-top: 16px;
    text-align: right;
    font-size: 1.1rem;
    font-weight: 600;
    color: #c0392b;
  }

  /* Typewriter cursor */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: #c0392b;
    animation: blink 0.7s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 1px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Bears */
  .bears-container {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    z-index: 15;
    opacity: 0;
    pointer-events: none;
  }

  .bears-container.rise-up {
    animation: bearsRise 1s ease forwards;
    animation-delay: 0.4s;
  }

  @keyframes bearsRise {
    0% { opacity: 0; transform: translateX(-50%) translateY(60px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(-50px); }
  }

  .bear-wrap {
    animation: sway 2.5s ease-in-out infinite;
    animation-delay: 1.4s;
  }

  .bear-wrap:first-child { animation-direction: alternate; transform-origin: bottom center; }
  .bear-wrap:last-child { animation-direction: alternate-reverse; transform-origin: bottom center; }

  @keyframes sway {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  /* Floating hearts around bears */
  .bear-heart {
    position: absolute;
    font-size: 0.9rem;
    animation: bearHeartFloat ease-in-out infinite;
    opacity: 0;
    pointer-events: none;
  }

  @keyframes bearHeartFloat {
    0% { transform: translateY(0) scale(0.5); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-70px) scale(1); opacity: 0; }
  }

  /* Envelope flap open animation */
  .flap-open {
    animation: openFlap 0.8s ease forwards !important;
  }

  @keyframes openFlap {
    0% { transform: rotateX(0deg); }
    100% { transform: rotateX(-180deg); }
  }

  /* Envelope shake on hover */
  @keyframes envelopeShake {
    0%, 100% { transform: translateY(-5px) rotate(0deg); }
    25% { transform: translateY(-5px) rotate(-1deg); }
    75% { transform: translateY(-5px) rotate(1deg); }
  }

  /* Full letter reveal container */
  .full-letter-reveal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
    animation: fadeInOverlay 0.5s ease;
  }

  .full-letter-reveal.show { display: flex; }

  @keyframes fadeInOverlay {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .full-letter-inner {
    background: linear-gradient(160deg, #fdf8f0, #fef9e7, #fdf3e3);
    border-radius: 8px;
    padding: 36px 32px;
    max-width: 480px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow:
      0 30px 80px rgba(0,0,0,0.3),
      0 10px 30px rgba(0,0,0,0.2),
      inset 0 1px 3px rgba(255,255,255,0.9);
    border: 1px solid rgba(210, 180, 140, 0.5);
    position: relative;
    animation: letterAppear 0.6s ease;
  }

  @keyframes letterAppear {
    from { transform: translateY(30px) scale(0.95); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  .full-letter-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      transparent,
      transparent 29px,
      rgba(173, 145, 110, 0.1) 30px
    );
    pointer-events: none;
    border-radius: 8px;
  }

  .full-letter-title {
    font-family: 'Dancing Script', cursive;
    font-size: 2rem;
    font-weight: 700;
    color: #c0392b;
    text-align: center;
    margin-bottom: 20px;
    text-shadow: 0 1px 3px rgba(192, 57, 43, 0.2);
    position: relative;
    z-index: 1;
    line-height: 1.3;
  }

  .full-letter-divider {
    width: 60%;
    height: 1.5px;
    background: linear-gradient(to right, transparent, rgba(192, 57, 43, 0.5), transparent);
    margin: 0 auto 22px;
    position: relative;
    z-index: 1;
  }

  .full-letter-body {
    font-family: 'Dancing Script', cursive;
    font-size: 1.15rem;
    color: #5d3a1a;
    line-height: 2;
    position: relative;
    z-index: 1;
  }

  .full-letter-body p { margin-bottom: 14px; }

  .full-letter-body .signature {
    margin-top: 20px;
    text-align: right;
    font-size: 1.25rem;
    font-weight: 700;
    color: #c0392b;
  }

  .close-letter-btn {
    position: absolute;
    top: 14px;
    right: 16px;
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: #c0392b;
    opacity: 0.7;
    transition: opacity 0.2s;
    z-index: 2;
  }

  .close-letter-btn:hover { opacity: 1; }

  /* Floating hearts in full letter view */
  .letter-float-heart {
    position: absolute;
    animation: letterHeartFloat ease-in-out infinite;
    opacity: 0;
    pointer-events: none;
    font-size: 1rem;
    z-index: 1;
  }

  @keyframes letterHeartFloat {
    0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
    30% { opacity: 0.6; }
    100% { transform: translateY(-120px) scale(1.2) rotate(20deg); opacity: 0; }
  }

  .read-full-btn {
    background: linear-gradient(135deg, #e91e63, #f48fb1);
    color: white;
    border: none;
    padding: 10px 28px;
    border-radius: 50px;
    font-family: 'Dancing Script', cursive;
    font-size: 1.15rem;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(233, 30, 99, 0.35);
    transition: all 0.3s ease;
    margin-top: 14px;
    display: none;
    position: relative;
    z-index: 20;
  }

  .read-full-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(233, 30, 99, 0.5);
  }

  .read-full-btn.show { display: block; }

  @media (max-width: 480px) {
    .full-letter-inner { padding: 28px 20px; }
    .full-letter-title { font-size: 1.6rem; }
    .full-letter-body { font-size: 1rem; }
  }
</style>
</head>
<body>

<!-- Background floating hearts (created by JS) -->

<!-- Full letter modal -->
<div class="full-letter-reveal" id="fullLetterModal">
  <div class="full-letter-inner" id="fullLetterInner">

</div>

    <!-- Bears -->

          <ellipse cx="35" cy="62" rx="22" ry="26" fill="#c8956c"/>

          <circle cx="35" cy="32" r="20" fill="#c8956c"/>

          <ellipse cx="35" cy="35" rx="12" ry="10" fill="#e8c4a0"/>
          <!-- Left ear -->
          <circle cx="18" cy="16" r="8" fill="#c8956c"/>

          <!-- Right ear -->
          <circle cx="52" cy="16" r="8" fill="#c8956c"/>

          <ellipse cx="35" cy="36" rx="4" ry="3" fill="#a0604a"/>

          <!-- Heart on belly -->
          <text x="29" y="72" font-size="12" fill="#e91e63">❤</text>

      </div>

      <!-- Right bear (mirrored, slightly different) -->
      <div class="bear-wrap">
        <svg width="70" height="90" viewBox="0 0 70 90" xmlns="http://www.w3.org/2000/svg" style="transform: scaleX(-1)">

    <!-- Envelope SVG -->
    <div class="envelope-svg-wrap" id="envelopeSvgWrap">

          <linearGradient id="envBody" x1="0%" y1="0%" x2="100%" y2="100%">

          <linearGradient id="envFlap" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#f8d0e8"/>
            <stop offset="100%" style="stop-color:#f0a8cc"/>
          </linearGradient>
          <linearGradient id="envShadowLeft" x1="0%" y1="0%" x2="100%" y2="0%">

          </linearGradient>
          <linearGradient id="envShadowRight" x1="100%" y1="0%" x2="0%" y2="0%">
            <stop offset="0%" style="stop-color:#e8a0c0; stop-opacity:0.6"/>
            <stop offset="100%" style="stop-color:#ffe0ec; stop-opacity:0"/>
          </linearGradient>
          <filter id="envShadow">
            <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#d4607080" flood-opacity="0.4"/>
          </filter>
        </defs>

        <!-- Envelope body -->
        <rect x="4" y="60" width="332" height="176" rx="12" ry="12" fill="url(#envBody)" filter="url(#envShadow)"/>

        <!-- Side fold shadows -->
        <polygon points="4,60 170,160 4,236" fill="url(#envShadowLeft)" opacity="0.4"/>
        <polygon points="336,60 170,160 336,236" fill="url(#envShadowRight)" opacity="0.4"/>

        <!-- Bottom flap interior -->
        <polygon points="4,236 170,152 336,236" fill="#f8c8e0" opacity="0.6"/>

        <!-- V-fold lines -->
        <line x1="4" y1="60" x2="170" y2="160" stroke="#e890b8" stroke-width="1" opacity="0.5"/>
        <line x1="336" y1="60" x2="170" y2="160" stroke="#e890b8" stroke-width="1" opacity="0.5"/>

        <!-- Envelope border -->
        <rect x="4" y="60" width="332" height="176" rx="12" ry="12" fill="none" stroke="#e890b8" stroke-width="1.5"/>

        <!-- Decorative inner border -->
        <rect x="12" y="68" width="316" height="160" rx="8" ry="8" fill="none" stroke="#f4b0d4" stroke-width="0.8" stroke-dasharray="6,4"/>

        <!-- Wax seal -->
        <circle cx="170" cy="168" r="22" fill="#e91e63" filter="url(#envShadow)" opacity="0.9"/>
        <circle cx="170" cy="168" r="18" fill="none" stroke="#c0104a" stroke-width="1.5"/>
        <circle cx="170" cy="168" r="14" fill="#c0104a" opacity="0.4"/>
        <text x="170" y="174" text-anchor="middle" font-size="18" fill="white">❤</text>

        <!-- Envelope flap (top triangle) - with transform-origin for rotation -->
        <g id="envelopeFlap" style="transform-origin: 170px 60px; transform-box: fill-box;">
          <polygon id="flapPoly" points="4,62 170,158 336,62" fill="url(#envFlap)" stroke="#e890b8" stroke-width="1.5"/>
          <!-- Flap decorative lines -->
          <line x1="4" y1="62" x2="170" y2="100" stroke="#f4b0d4" stroke-width="0.6" opacity="0.6"/>
          <line x1="336" y1="62" x2="170" y2="100" stroke="#f4b0d4" stroke-width="0.6" opacity="0.6"/>
        </g>

        <!-- Corner decorations -->
        <text x="18" y="90" font-size="14" opacity="0.5">🌸</text>
        <text x="302" y="90" font-size="14" opacity="0.5">🌸</text>
        <text x="18" y="228" font-size="14" opacity="0.5">💕</text>
        <text x="300" y="228" font-size="14" opacity="0.5">💕</text>
      </svg>
    </div>

  </div>

  <!-- Tap button -->
  <button class="tap-btn" id="tapBtn" onclick="openEnvelope()">
    💌 Tap the Envelope
  </button>

  <!-- Read full letter button (appears after animation) -->
  <button class="read-full-btn" id="readFullBtn" onclick="showFullLetter()">
    📖 Read Full Letter
  </button>

</div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────────
  let isOpened = false;

  // ─── Letter content ──────────────────────────────────────────────────────────
  const letterTitleText = "Get Well Soon My Love ❤️";
  const letterLines = [
    { text: "My Beautiful Love,", isP: true },
    { text: "I know you're not feeling your best right now, and I wish I could be there holding your hand and making everything better.", isP: true },
    { text: "Daddy misses you so much. I miss your smile, your laugh, your hugs, and everything about you.", isP: true },
    { text: "No matter how far apart we are, my heart is always with you. I care about you deeply and want nothing more than to see you happy and healthy again.", isP: true },
    { text: "Get well soon, my princess.", isP: true },
    { text: "Forever Yours, Daddy ❤️", isP: false, isSignature: true }
  ];

  // ─── Background floating hearts ──────────────────────────────────────────────
  const heartChars = ['❤️','💕','💗','💖','💓','💘','🌸','💝'];
  for (let i = 0; i < 20; i++) {
    const h = document.createElement('div');
    h.className = 'bg-heart';
    h.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.animationDuration = (8 + Math.random() * 12) + 's';
    h.style.animationDelay = (Math.random() * 15) + 's';
    h.style.fontSize = (0.8 + Math.random() * 1.4) + 'rem';
    document.body.appendChild(h);
  }

  // ─── Open envelope ───────────────────────────────────────────────────────────
  function openEnvelope() {
    if (isOpened) return;
    isOpened = true;

    // Hide tap button
    const btn = document.getElementById('tapBtn');
    btn.classList.add('hidden');

    // Play "sound" (oscillator beep as placeholder)
    playSoundEffect();

    // Animate flap open
    const flap = document.getElementById('envelopeFlap');
    flap.style.animation = 'openFlap 0.8s ease forwards';
    flap.style.transformOrigin = '170px 60px';

    // Rise bears after delay
    setTimeout(() => {
      const bears = document.getElementById('bearsContainer');
      bears.classList.add('rise-up');
    }, 400);

    // Slide letter up
    setTimeout(() => {
      const lc = document.getElementById('letterContainer');
      lc.classList.add('slide-up');

      // Start typewriter after letter comes up
      setTimeout(() => {
        startTypewriter();
      }, 1200);
    }, 600);

    // Show read full button
    setTimeout(() => {
      document.getElementById('readFullBtn').classList.add('show');
    }, 3500);

    // Remove click from envelope
    document.getElementById('envelopeWrapper').style.cursor = 'default';
  }

  // ─── Sound effect (Web Audio API) ────────────────────────────────────────────
  function playSoundEffect() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [523.25, 659.25, 783.99, 1046.50]; // C5 E5 G5 C6
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.15);
        gain.gain.linearRampToValueAtTime(0.08, ctx.currentTime + i * 0.15 + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.4);
        osc.start(ctx.currentTime + i * 0.15);
        osc.stop(ctx.currentTime + i * 0.15 + 0.5);
      });
    } catch(e) {}
  }

  // ─── Typewriter effect ───────────────────────────────────────────────────────
  function startTypewriter() {
    const titleEl = document.getElementById('letterTitle');
    const bodyEl = document.getElementById('letterBody');
    
    // Clear
    titleEl.innerHTML = '';
    bodyEl.innerHTML = '';

    // Type title first
    typeText(titleEl, letterTitleText, 0, 50, () => {
      // Then type body
      typeLetterBody(bodyEl, 0, () => {});
    });
  }

  function typeText(el, text, index, speed, onDone) {
    if (index === 0) {
      el.innerHTML = '<span class="cursor"></span>';
    }
    if (index < text.length) {
      // Insert before cursor
      const cursor = el.querySelector('.cursor');
      const span = document.createElement('span');
      span.textContent = text[index];
      el.insertBefore(span, cursor);
      setTimeout(() => typeText(el, text, index + 1, speed, onDone), speed);
    } else {
      // Remove cursor from title, add to body
      const cursor = el.querySelector('.cursor');
      if (cursor) cursor.remove();
      if (onDone) onDone();
    }
  }

  function typeLetterBody(el, lineIndex, onDone) {
    if (lineIndex >= letterLines.length) {
      if (onDone) onDone();
      return;
    }

    const line = letterLines[lineIndex];
    const p = document.createElement('p');
    if (line.isSignature) p.className = 'signature';
    
    // Add cursor span
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    p.appendChild(cursor);
    el.appendChild(p);

    // Scroll into view
    el.scrollTop = el.scrollHeight;

    typeTextInPara(p, cursor, line.text, 0, 28, () => {
      cursor.remove();
      setTimeout(() => typeLetterBody(el, lineIndex + 1, onDone), 200);
    });
  }

  function typeTextInPara(p, cursor, text, index, speed, onDone) {
    if (index < text.length) {
      const span = document.createElement('span');
      span.textContent = text[index];
      p.insertBefore(span, cursor);
      setTimeout(() => typeTextInPara(p, cursor, text, index + 1, speed, onDone), speed);
    } else {
      if (onDone) onDone();
    }
  }

  // ─── Full letter modal ───────────────────────────────────────────────────────
  function showFullLetter() {
    const modal = document.getElementById('fullLetterModal');
    const body = document.getElementById('fullLetterBody');
    modal.classList.add('show');

    // Build full letter content
    body.innerHTML = '';
    letterLines.forEach(line => {
      const p = document.createElement('p');
      if (line.isSignature) p.className = 'signature';
      p.textContent = line.text;
      body.appendChild(p);
    });

    // Add floating hearts inside the letter
    const inner = document.getElementById('fullLetterInner');
    for (let i = 0; i < 6; i++) {
      const h = document.createElement('div');
      h.className = 'letter-float-heart';
      h.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
      h.style.left = (10 + Math.random() * 80) + '%';
      h.style.bottom = '10px';
      h.style.animationDuration = (3 + Math.random() * 3) + 's';
      h.style.animationDelay = (Math.random() * 4) + 's';
      h.style.animationIterationCount = 'infinite';
      inner.appendChild(h);
    }
  }

  function closeLetter() {
    document.getElementById('fullLetterModal').classList.remove('show');
  }

  // Close on backdrop click
  document.getElementById('fullLetterModal').addEventListener('click', function(e) {
    if (e.target === this) closeLetter();
  });

  // ─── Continuously add more background hearts ─────────────────────────────────
  setInterval(() => {
    if (Math.random() > 0.6) {
      const h = document.createElement('div');
      h.className = 'bg-heart';
      h.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.animationDuration = (8 + Math.random() * 10) + 's';
      h.style.animationDelay = '0s';
      h.style.fontSize = (0.7 + Math.random() * 1.2) + 'rem';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 20000);
    }
  }, 1500);
</script>
</body>
</html>
